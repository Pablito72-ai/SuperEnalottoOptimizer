name: Compilazione Automatica EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Permette di far partire la compilazione a mano quando vuoi

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Esamina codice repository
      uses: actions/checkout@v4

    - name: Configura Ambiente Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Installa il compilatore PyInstaller
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: Compilazione del file EXE offline
      run: pyinstaller --onefile --console superenalotto.py

    - name: Pubblica il file scaricabile
      uses: actions/upload-artifact@v4
      with:
        name: SuperEnalotto-Software-Offline
        path: dist/superenalotto.exe
